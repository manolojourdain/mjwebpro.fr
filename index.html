<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Web Pro | Maintenance</title>

    <script defer src="https://cloud.umami.is/script.js" data-website-id="8520de19-6d81-48a6-8311-6a9620e0aed7"></script>

    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* Importation de polices ultra-modernes */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Inter:wght@300;400&display=swap');

        :root {
            --accent-color: #007aff;
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --font-display: 'Montserrat', sans-serif;
            --font-ui: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-ui);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            pointer-events: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .brand {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        p {
            font-family: var(--font-ui);
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            position: absolute;
            height: 100%;
            width: 35%;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            animation: moveProgress 2s infinite ease-in-out;
        }

        @keyframes moveProgress {
            0% { left: -35%; }
            100% { left: 100%; }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .glass-card { padding: 40px 20px; }
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="main-wrapper">
        <div class="glass-card">
            <span class="brand">MJ Web Pro</span>
            <h1>En maintenance</h1>
            <p>Nous travaillons sur une nouvelle version de notre plateforme pour mieux vous accompagner dans vos projets digitaux.</p>
            
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>

        <footer>
            MJ Web Pro &bull; Excellence Digitale
        </footer>
    </div>

    <script>
        let scene, camera, renderer, particles, mouseX = 0, mouseY = 0;
        const particleCount = 130;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 450;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const vels = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 900;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 900;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 900;
                vels.push({ x: (Math.random() - 0.5) * 0.4, y: (Math.random() - 0.5) * 0.4, z: (Math.random() - 0.5) * 0.4 });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0x007aff, size: 2.8, transparent: true, opacity: 0.7 });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            particles.userData.vels = vels;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) * 0.03;
                mouseY = (e.clientY - window.innerHeight / 2) * 0.03;
            });
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = particles.geometry.attributes.position.array;
            const v = particles.userData.vels;

            for (let i = 0; i < particleCount; i++) {
                pos[i*3] += v[i].x; pos[i*3+1] += v[i].y; pos[i*3+2] += v[i].z;
                if (Math.abs(pos[i*3]) > 450) v[i].x *= -1;
                if (Math.abs(pos[i*3+1]) > 450) v[i].y *= -1;
                if (Math.abs(pos[i*3+2]) > 450) v[i].z *= -1;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += (mouseX - particles.rotation.y) * 0.05;
            particles.rotation.x += (mouseY - particles.rotation.x) * 0.05;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
